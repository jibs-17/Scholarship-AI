name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Placeholder so Next can inline a value; real URL comes from Vercel at deploy time.
          NEXT_PUBLIC_CONVEX_URL: https://ci-build.convex.cloud
          NEXT_PUBLIC_SITE_URL: https://ci.example.com
        run: npm run build
